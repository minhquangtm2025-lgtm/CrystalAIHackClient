# GitHub Actions tự động build AI Hack Client cho Minecraft 1.21.11
name: build
on: [pull_request, push]

jobs:
  build:
    runs-on: ubuntu-latest # Sử dụng bản ổn định mới nhất
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: setup jdk 21
        uses: actions/setup-java@v4
        with:
          # Fabric 1.21.11 yêu cầu Java 21 theo fabric.mod.json của bạn
          java-version: '21' 
          distribution: 'microsoft'

      - name: setup gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Tự động lưu cache để các lần build sau nhanh hơn (cực cháy!)
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: build mod
        # Sử dụng 'build' để tạo file .jar trong thư mục build/libs/
        run: ./gradlew build

      - name: capture build artifacts
        uses: actions/upload-artifact@v4
        with:
          # Tên file khi tải về sẽ là AI-Hack-Client-1.21.11
          name: CrystalAI-1.21.11
          path: build/libs/

